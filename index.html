<meta name="apple-mobile-web-app-title" content="CPT Clinic">
<meta name="theme-color" content="#1e1b4b">
<style>
:root{
  --bg:#0b1024; --panel:#141a3a; --panel2:#1b2350; --ink:#e6ecff;
  --muted:#a6b0d8; --line:rgba(255,255,255,.08);
  --blue:#3b82f6; --violet:#8b5cf6; --gold:#fbbf24; --gold-2:#f59e0b;
  --good:#22c55e; --bad:#f43f5e;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh}
body{padding-bottom:env(safe-area-inset-bottom)}
header{
  background:linear-gradient(120deg,#1e1b4b,#3b1d80 40%,#6d28d9);
  padding:14px 16px calc(14px + env(safe-area-inset-top,0)) 16px;
  border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:20;
}
.hbar{display:flex;align-items:center;gap:12px}
.logo{width:42px;height:42px;flex:0 0 42px;border-radius:11px;box-shadow:0 4px 14px rgba(124,58,237,.5);display:block;object-fit:cover}
h1{font-size:18px;margin:0;font-weight:800;letter-spacing:.2px;line-height:1.15}
.sub{color:#c4c9ea;font-size:12px;margin-top:2px;line-height:1.15}
main{max-width:900px;margin:0 auto;padding:12px 14px}
.chapnav{display:flex;gap:8px;overflow-x:auto;padding:10px 2px 12px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.chapnav::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;background:var(--panel);border:1px solid var(--line);color:var(--ink);padding:9px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;white-space:nowrap;line-height:1}
.chip .n{color:var(--gold);font-weight:800;font-size:12px}
.chip.active{background:linear-gradient(120deg,var(--blue),var(--violet));border-color:transparent;box-shadow:0 4px 12px rgba(59,130,246,.35)}
.chip.active .n{color:#fde68a}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;background:var(--panel);border:1px solid var(--line);padding:6px;border-radius:14px}
.tab{padding:11px 4px;border-radius:10px;font-weight:700;font-size:13px;text-align:center;cursor:pointer;color:var(--muted);line-height:1}
.tab.active{background:linear-gradient(120deg,var(--blue),var(--violet));color:#fff;box-shadow:0 4px 12px rgba(139,92,246,.35)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin:12px 0;box-shadow:0 6px 24px rgba(0,0,0,.25)}
.card h3{margin:0 0 6px;font-size:15px;color:var(--gold);line-height:1.3}
.card p{margin:0;color:#dfe4ff;font-size:14px;line-height:1.5}
.chap-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:14px 2px 8px}
.chap-title{font-size:16px;font-weight:800;letter-spacing:.2px;line-height:1.25;flex:1;min-width:0}
.pill{flex:0 0 auto;background:linear-gradient(120deg,var(--gold),var(--gold-2));color:#3b2606;font-weight:800;padding:5px 11px;border-radius:999px;font-size:11px;white-space:nowrap}
.flip{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px 18px;text-align:center;min-height:170px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:10px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.flip .q{font-size:15px;font-weight:700;color:#fff;line-height:1.4}
.flip .a{font-size:14px;color:#d5dcff;line-height:1.5}
.flip .hint{color:var(--muted);font-size:11px}
.row{display:flex;justify-content:space-between;align-items:center;margin-top:12px;gap:8px}
.row .btn{flex:1}
button.btn{background:linear-gradient(120deg,var(--blue),var(--violet));border:none;color:#fff;font-weight:700;padding:11px 14px;border-radius:12px;cursor:pointer;font-size:14px;line-height:1}
button.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
button.btn.gold{background:linear-gradient(120deg,var(--gold),var(--gold-2));color:#3b2606}
button.btn:disabled{opacity:.35}
.progress{height:8px;background:#0d1330;border-radius:999px;overflow:hidden;margin-top:8px}
.progress>i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--violet),var(--gold));width:0%;transition:width .3s}
.opt{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin:8px 0;cursor:pointer;font-size:14px;color:#e6ecff;line-height:1.4;-webkit-tap-highlight-color:transparent}
.opt.correct{background:rgba(34,197,94,.15);border-color:var(--good)}
.opt.wrong{background:rgba(244,63,94,.15);border-color:var(--bad)}
.opt.locked{cursor:default}
.explain{background:rgba(251,191,36,.08);border-left:3px solid var(--gold);padding:10px 12px;border-radius:8px;margin-top:8px;font-size:13px;color:#f5e9c8;line-height:1.45}
.qmeta{color:var(--muted);font-size:12px;line-height:1.3}

/* Mastery */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 10px;text-align:center;display:flex;flex-direction:column;justify-content:center;min-height:78px}
.stat .n{font-size:26px;font-weight:800;color:var(--gold);line-height:1.1}
.stat .l{color:var(--muted);font-size:11px;margin-top:4px;letter-spacing:.3px;text-transform:uppercase}
.master-list{margin-top:16px;display:flex;flex-direction:column;gap:8px}
.master-row{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:12px 14px;background:var(--panel);border:1px solid var(--line);border-radius:12px}
.master-row .left{min-width:0}
.master-row .t{font-weight:600;font-size:13px;line-height:1.3;display:flex;align-items:center;gap:6px}
.master-row .qmeta{margin-top:3px}
.master-row .right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex:0 0 auto}
.master-row .pct{color:var(--gold);font-weight:800;font-size:13px;line-height:1}
.bar{height:6px;width:90px;background:#0d1330;border-radius:999px;overflow:hidden}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--gold));transition:width .3s}
.footer{text-align:center;color:var(--muted);font-size:11px;padding:24px 12px 30px}
.dot{width:8px;height:8px;flex:0 0 8px;border-radius:50%;display:inline-block}
.dot.done{background:var(--good)} .dot.some{background:var(--gold)} .dot.none{background:#444a70}
@media(min-width:560px){.grid{grid-template-columns:repeat(4,1fr)} .bar{width:120px}}
</style>
</head>

<script>
const CHAPTERS = [{"n": 1, "title": "Exam Anatomy & Strategy", "emoji": "\ud83c\udfaf", "rules": [{"h": "CPC exam blueprint", "b": "100 questions, 4 hours, open book. Surgery \u224836%, Radiology/Path/Medicine \u224818%, Medical Cases \u224810%, Anesthesia+HCPCS \u224810%, Med Term \u22488%, Guidelines/Modifiers \u22487%, E/M \u22486%, ICD-10-CM \u22485%."}, {"h": "Three-pass method", "b": "Pass 1: answer everything you know cold in under 60 sec each. Pass 2: work the case-based questions. Pass 3: verify flagged. Never leave blanks \u2014 no penalty for guessing."}, {"h": "2.4 minutes per question", "b": "240 min / 100 q = 2.4 min average. Check the clock at Q25, Q50, Q75. If behind, guess-and-flag the long ones and keep moving."}, {"h": "Book prep = tabs + highlights", "b": "Tab CPT by section (E/M, Anesthesia, Surgery subsections, Radiology, Path/Lab, Medicine). Highlight guidelines at the front of every section. HCPCS: tab by letter. ICD-10: tab tabular by chapter."}, {"h": "Answer the question asked", "b": "Read the last sentence first. 'Which code?' vs 'Which codes?' vs 'Which modifier?' \u2014 the trap is answering a different question than what's asked."}, {"h": "Eliminate two, then decide", "b": "Cross out two wrong answers first. The remaining two usually differ by one digit, one modifier, or laterality \u2014 that's where to focus."}], "cards": [{"q": "How many questions on the CPC exam?", "a": "100 questions in 4 hours."}, {"q": "Largest single section of the CPC exam?", "a": "Surgery (~36% of the exam)."}, {"q": "Average time per question?", "a": "About 2.4 minutes."}, {"q": "Penalty for guessing?", "a": "None. Never leave blanks."}, {"q": "Which books are allowed?", "a": "CPT, ICD-10-CM, HCPCS Level II \u2014 current year, with handwritten tabs and highlights only."}, {"q": "What must you read first on every question?", "a": "The actual question stem \u2014 often the last sentence."}], "quiz": [{"q": "You have 20 minutes left and 12 questions remaining. What's the correct move?", "opts": ["Skip them all", "Guess-and-flag any long ones, answer short ones carefully", "Slow down to be accurate", "Leave blanks to avoid wrong answers"], "a": 1, "e": "Never leave blanks. Fast-guess long questions, keep moving."}, {"q": "You've eliminated two answers. The remaining two are 27447 and 27448. What's the likely distinguishing detail?", "opts": ["The patient's age", "Anatomic specificity or approach", "The date of service", "The provider's specialty"], "a": 1, "e": "Adjacent CPT codes almost always differ by anatomic detail, approach, or extent."}, {"q": "Which section carries the most exam weight?", "opts": ["E/M", "Surgery", "Radiology", "Medicine"], "a": 1, "e": "Surgery is roughly 36% \u2014 the single biggest slice."}, {"q": "How much time should you plan per question on average?", "opts": ["1 minute", "2.4 minutes", "4 minutes", "5 minutes"], "a": 1, "e": "240 min / 100 q = 2.4 min."}, {"q": "When should you check the clock?", "opts": ["Only at the end", "At Q25, Q50, Q75", "Every 5 questions", "Never"], "a": 1, "e": "Quarter-point checks let you course-correct without breaking flow."}]}, {"n": 2, "title": "CPT Structure", "emoji": "\ud83d\udcd6", "rules": [{"h": "CPT sections at a glance", "b": "E/M 99202\u201399499 | Anesthesia 00100\u201301999 | Surgery 10004\u201369990 | Radiology 70010\u201379999 | Pathology/Lab 80047\u201389398 | Medicine 90281\u201399607. Category II = performance tracking (F codes). Category III = emerging tech (T codes)."}, {"h": "Read the guidelines", "b": "Every section starts with guidelines. Every subsection has its own notes. Every code family (parenthetical) has instructions. Miss those and you'll pick the wrong code."}, {"h": "Semicolon rule", "b": "A code with a semicolon (parent code) shares its pre-semicolon text with every indented child below it, until the next parent. Read up the page to get the full descriptor."}, {"h": "Add-on codes (+)", "b": "Add-on codes are never billed alone. They're always reported in addition to a primary procedure. Never use modifier 51 on an add-on."}, {"h": "Modifier 51 exempt (\u2298)", "b": "The \u2298 symbol means the code is exempt from modifier 51 (multiple procedures). Don't apply it."}, {"h": "New/revised/telemedicine symbols", "b": "\u25cf new code | \u25b2 revised | \u25b6\u25c0 new/revised text | \u2605 telemedicine | # resequenced (out-of-numeric-order)."}], "cards": [{"q": "CPT Surgery code range?", "a": "10004\u201369990."}, {"q": "What does a + prefix mean on a CPT code?", "a": "Add-on code \u2014 reported with a primary procedure, never alone."}, {"q": "What does \u2298 mean?", "a": "Modifier 51 exempt."}, {"q": "How does the semicolon rule work?", "a": "The text before the semicolon in a parent code applies to all indented codes below it."}, {"q": "What are Category III codes?", "a": "Temporary codes for emerging technology, services, and procedures (T codes)."}, {"q": "What's the E/M section range?", "a": "99202\u201399499."}], "quiz": [{"q": "Code 27447 shows a + before it. What does that mean?", "opts": ["It's a new code", "It's an add-on code", "It's modifier 51 exempt", "It's a revised code"], "a": 1, "e": "+ = add-on code."}, {"q": "You see: '25500 Closed treatment of radial shaft fracture; without manipulation' then '25505 with manipulation'. What does 25505 fully describe?", "opts": ["Closed treatment with manipulation of any bone", "Closed treatment of radial shaft fracture with manipulation", "Any fracture treatment with manipulation", "Manipulation only"], "a": 1, "e": "Semicolon rule: 25505 inherits 'Closed treatment of radial shaft fracture' from the parent."}, {"q": "An add-on code requires which modifier when multiple procedures are done?", "opts": ["Modifier 51", "Modifier 59", "No modifier 51 needed \u2014 add-ons are 51-exempt", "Modifier 22"], "a": 2, "e": "Add-ons are always 51-exempt."}, {"q": "Where do you find the rules that govern a whole section like Surgery?", "opts": ["In the CPT index", "In the section-opening guidelines", "On the AMA website", "In parenthetical notes only"], "a": 1, "e": "Guidelines at the start of each section are binding."}, {"q": "What does the \u2605 symbol next to a CPT code indicate?", "opts": ["New code", "Revised code", "Telemedicine-eligible", "Add-on"], "a": 2, "e": "\u2605 marks codes eligible for telemedicine."}]}, {"n": 3, "title": "The Modifier Playbook", "emoji": "\ud83c\udff7\ufe0f", "rules": [{"h": "22 \u2014 Increased procedural service", "b": "Substantially greater work than usual. Requires documentation (op note describing why). Not for E/M."}, {"h": "25 \u2014 Separate significant E/M same day", "b": "E/M on the same day as a minor procedure. The E/M must be separately identifiable \u2014 go beyond the pre/post work included in the procedure."}, {"h": "26 / TC \u2014 Professional / Technical", "b": "26 = physician interpretation only. TC = equipment/tech component only. Global = both, no modifier. Use for radiology, path, some cardiology."}, {"h": "50 \u2014 Bilateral procedure", "b": "Same procedure, both sides, one session. Report once with -50 (payer-dependent \u2014 some want two lines with RT/LT)."}, {"h": "51 vs 59", "b": "51 = multiple procedures at same session (secondary procedure). 59 = distinct procedural service \u2014 different site, session, or separately identifiable. 59 unbundles NCCI edits when appropriate."}, {"h": "57 vs 25", "b": "57 = E/M that led to the decision for MAJOR surgery (90-day global). 25 = separate E/M with a MINOR procedure (0- or 10-day global) same day."}, {"h": "58 / 78 / 79 \u2014 Post-op returns", "b": "58 = staged/planned/more extensive. 78 = unplanned return to OR for complication (related). 79 = unrelated procedure by same physician during global."}, {"h": "76 / 77 \u2014 Repeat procedures", "b": "76 = repeat by same physician. 77 = repeat by another physician."}, {"h": "RT / LT / F1-FA / T1-TA / E1-E4", "b": "HCPCS anatomic modifiers \u2014 required for accurate laterality/digit/eyelid coding. Use with CPT."}, {"h": "XE / XP / XS / XU \u2014 59 subsets", "b": "XE = separate encounter, XP = separate practitioner, XS = separate structure, XU = unusual non-overlapping. Payers may require these instead of 59."}], "cards": [{"q": "When is modifier 22 used?", "a": "When the procedure required substantially greater work than usual (must be documented)."}, {"q": "Modifier 25 vs 57 \u2014 how do you choose?", "a": "25 = E/M with minor procedure (0 or 10-day global). 57 = E/M leading to decision for major surgery (90-day global)."}, {"q": "What does modifier 26 report?", "a": "The professional component only (physician interpretation)."}, {"q": "What does modifier 78 mean?", "a": "Unplanned return to the OR for a related complication during the global period."}, {"q": "Difference between 51 and 59?", "a": "51 = multiple procedures same session. 59 = distinct procedural service, used to unbundle appropriately."}, {"q": "What are the X-modifiers?", "a": "XE, XP, XS, XU \u2014 specific subsets of 59: separate encounter, practitioner, structure, or unusual non-overlapping service."}, {"q": "Which modifier for a bilateral procedure?", "a": "Modifier 50 (payer may require RT/LT on two lines instead)."}, {"q": "Same physician repeats an echo the same day. What modifier?", "a": "Modifier 76 \u2014 repeat procedure by same physician."}], "quiz": [{"q": "Patient returns to OR 3 days after cholecystectomy to control bleeding at the surgical site. What modifier on the bleeding-control procedure?", "opts": ["58", "78", "79", "59"], "a": 1, "e": "Unplanned return for related complication = 78."}, {"q": "Physician sees patient for chest pain, decides on CABG the next morning. What modifier on the E/M?", "opts": ["25", "57", "24", "59"], "a": 1, "e": "Decision for major (90-day global) surgery = 57."}, {"q": "Radiologist reads a chest X-ray done at an outpatient hospital. He does not own the equipment. Modifier?", "opts": ["TC", "26", "50", "No modifier"], "a": 1, "e": "Professional interpretation only = 26."}, {"q": "Colonoscopy with biopsy of one lesion and polypectomy of a different lesion. What supports separate reporting?", "opts": ["Modifier 51 on the polypectomy", "Modifier 59 (or XS) on the polypectomy \u2014 separate structure", "Modifier 22 on the biopsy", "No modifier \u2014 bundled always"], "a": 1, "e": "Different lesions = distinct procedural service. 59 or XS unbundles per NCCI."}, {"q": "Bilateral tympanostomy. Best coding?", "opts": ["69436 x 2", "69436-50", "69436-51", "69436-RT and 69436-LT with 51"], "a": 1, "e": "Modifier 50 = bilateral, one line, one code."}, {"q": "E/M visit same day as minor procedure with 10-day global, and the E/M addressed a separate complaint. Modifier on E/M?", "opts": ["57", "25", "24", "59"], "a": 1, "e": "Separate significant E/M with minor procedure = 25."}, {"q": "Planned second-stage skin graft 2 weeks after burn debridement, during global period. Modifier?", "opts": ["58", "78", "79", "76"], "a": 0, "e": "Staged/planned procedure = 58."}]}, {"n": 4, "title": "E/M \u2014 MDM and Time", "emoji": "\ud83e\ude7a", "rules": [{"h": "2021+ E/M rules", "b": "Office/outpatient (99202\u201399215) selected by either Medical Decision Making (MDM) OR total time on the date of the encounter. History and exam are no longer scored \u2014 but must still be medically appropriate."}, {"h": "MDM has 3 elements", "b": "(1) Number and complexity of problems addressed. (2) Amount/complexity of data reviewed. (3) Risk of complications/morbidity/mortality. Level = met or exceeded in 2 of 3."}, {"h": "Problems addressed table", "b": "Straightforward = 1 self-limited. Low = 2+ self-limited OR 1 stable chronic. Moderate = 1+ chronic with exacerbation, or undiagnosed new problem with uncertain prognosis, or acute illness with systemic symptoms. High = 1+ chronic with severe exacerbation, or acute/chronic threatening life or bodily function."}, {"h": "Data categories", "b": "Category 1: tests/documents reviewed or ordered. Category 2: independent interpretation of a test. Category 3: discussion with other provider or patient/family. Moderate needs 1 of 3 categories met at threshold; High needs 2 of 3."}, {"h": "Risk examples", "b": "Low: OTC drugs. Moderate: Rx drug management, minor surgery with risk factors, social determinants limiting care. High: drug therapy with intensive monitoring for toxicity, decision for major surgery, decision re: hospitalization, DNR."}, {"h": "Time-based coding", "b": "Total time on date of encounter (both face-to-face and non-face-to-face by physician/QHP). Includes chart review, ordering, documenting, coordinating care. Does not include staff time."}, {"h": "Time thresholds (new patient)", "b": "99202: 15\u201329 min | 99203: 30\u201344 | 99204: 45\u201359 | 99205: 60\u201374. Established: 99212: 10\u201319 | 99213: 20\u201329 | 99214: 30\u201339 | 99215: 40\u201354."}, {"h": "Prolonged services 99417", "b": "Add-on for each additional 15 minutes beyond 99205 or 99215. Requires time-based selection (not MDM)."}], "cards": [{"q": "How are 99202\u201399215 selected under 2021+ rules?", "a": "By MDM or by total time on the date of the encounter."}, {"q": "How many MDM elements must be met?", "a": "2 of 3 (problems, data, risk)."}, {"q": "Time range for 99214?", "a": "30\u201339 minutes total time."}, {"q": "Which prolonged service code goes with 99205/99215?", "a": "99417 \u2014 each additional 15 minutes."}, {"q": "Example of high risk?", "a": "Drug therapy requiring intensive toxicity monitoring, decision for major surgery, decision for hospitalization, DNR."}, {"q": "Does staff time count for E/M time-based coding?", "a": "No \u2014 only physician/QHP time on the date of the encounter."}, {"q": "What counts as 'moderate' problem complexity?", "a": "1+ chronic with exacerbation, undiagnosed new problem with uncertain prognosis, or acute illness with systemic symptoms."}, {"q": "Is history/exam scored anymore for office E/M?", "a": "No \u2014 but they must still be medically appropriate and documented."}], "quiz": [{"q": "Established patient, 25 min total time, moderate MDM. Best code?", "opts": ["99213", "99214", "99215", "99212"], "a": 1, "e": "Moderate MDM alone supports 99214, regardless of time bucket."}, {"q": "New patient, 62 min total time. Best code?", "opts": ["99204", "99205", "99205 + 99417", "99215"], "a": 1, "e": "60\u201374 min = 99205. 99417 kicks in only after 74 min."}, {"q": "Which qualifies as 'high' risk?", "opts": ["OTC medications", "Prescription drug management", "Decision regarding hospitalization", "Physical therapy referral"], "a": 2, "e": "Decision to admit = high risk."}, {"q": "Physician spent 90 minutes total on a new patient visit. What's the best coding?", "opts": ["99205", "99205 + 99417 x 1", "99205 + 99417 x 2", "99215 + 99417"], "a": 1, "e": "75\u201389 min = 99205 + one 99417. 90 min just clears one unit."}, {"q": "Two stable chronic conditions managed. Which problem-level does that support?", "opts": ["Straightforward", "Low", "Moderate", "High"], "a": 2, "e": "Two stable chronic = moderate problem complexity per the MDM table."}, {"q": "Patient with acute uncomplicated illness, OTC medication reviewed. MDM level?", "opts": ["Straightforward", "Low", "Moderate", "High"], "a": 1, "e": "Acute uncomplicated + minimal data + low risk drugs \u2192 low MDM overall (99213 established)."}]}, {"n": 5, "title": "Anesthesia", "emoji": "\ud83d\udca4", "rules": [{"h": "Anesthesia formula", "b": "Payment = (Base units + Time units + Modifying units) \u00d7 Conversion factor. Base is set by CPT code. Time is per 15 min (some payers use different increments). Modifying = physical status + qualifying circumstances."}, {"h": "Physical status modifiers", "b": "P1 normal healthy | P2 mild systemic disease | P3 severe systemic disease | P4 severe systemic disease that's a constant threat to life | P5 moribund, not expected to survive without operation | P6 declared brain-dead, organ donor."}, {"h": "Qualifying circumstances", "b": "99100 extreme age (under 1 or over 70) | 99116 total body hypothermia | 99135 controlled hypotension | 99140 emergency conditions."}, {"h": "HCPCS anesthesia modifiers", "b": "AA = anesthesiologist personally performed | QK = medical direction of 2\u20134 concurrent | QY = medical direction of 1 CRNA | QX = CRNA with medical direction | QZ = CRNA without medical direction | AD = medical supervision >4 concurrent."}, {"h": "Anesthesia time", "b": "Starts when anesthesiologist begins preparing patient (usually pre-op area for induction). Ends when patient safely under post-anesthesia care and provider is no longer in personal attendance."}, {"h": "Anesthesia code choice", "b": "Anesthesia codes (00100\u201301999) are chosen by anatomic site of the surgery, not the surgical CPT. Multiple procedures = code the highest base-unit anesthesia code only."}], "cards": [{"q": "Anesthesia payment formula?", "a": "(Base + Time + Modifying units) \u00d7 Conversion factor."}, {"q": "What is P3?", "a": "Patient with severe systemic disease."}, {"q": "HCPCS modifier for anesthesiologist personally performing?", "a": "AA."}, {"q": "HCPCS modifier for CRNA without medical direction?", "a": "QZ."}, {"q": "When does anesthesia time start?", "a": "When the anesthesiologist begins preparing the patient (pre-induction)."}, {"q": "How is anesthesia code chosen when multiple procedures done under one anesthetic?", "a": "Report only the anesthesia code with the highest base unit value."}, {"q": "Qualifying circumstance code for a 5-month-old?", "a": "99100 \u2014 extreme age (under 1 year)."}], "quiz": [{"q": "Anesthesia for a 78-year-old with severe COPD. Physical status + qualifying circumstance?", "opts": ["P2, 99100", "P3, 99100", "P3 only", "P4, 99140"], "a": 1, "e": "Severe systemic disease = P3. Over 70 = 99100."}, {"q": "CRNA provides anesthesia without physician medical direction. HCPCS modifier?", "opts": ["AA", "QK", "QX", "QZ"], "a": 3, "e": "QZ = CRNA without medical direction."}, {"q": "Anesthesia base units for a case = 7, time units = 12, P3 = 1 unit. Total units?", "opts": ["19", "20", "22", "No math needed on exam"], "a": 1, "e": "7 + 12 + 1 = 20 units."}, {"q": "Emergency appendectomy at 2 AM. Qualifying circumstance code?", "opts": ["99100", "99116", "99135", "99140"], "a": 3, "e": "99140 = emergency conditions."}, {"q": "Anesthesiologist medically directs 3 concurrent CRNA cases. Modifier on his claim?", "opts": ["AA", "QK", "QX", "AD"], "a": 1, "e": "QK = medical direction of 2\u20134 concurrent."}, {"q": "Two procedures under one anesthetic \u2014 knee arthroscopy (base 4) and shoulder arthroscopy (base 5). How to report anesthesia?", "opts": ["Both codes", "Only the higher base \u2014 shoulder", "Only knee", "Sum both bases"], "a": 1, "e": "Report only the highest base-unit anesthesia code."}]}, {"n": 6, "title": "Surgery Package & Global", "emoji": "\ud83d\udd2a", "rules": [{"h": "CPT surgical package", "b": "Includes: local/topical anesthesia | one E/M same day (or day before for majors) | immediate post-op care | writing orders | evaluating in recovery | typical follow-up care."}, {"h": "Global periods", "b": "0-day: minor procedures, endoscopies | 10-day: minor surgery | 90-day: major surgery. Global includes typical, uncomplicated follow-up in office."}, {"h": "What breaks the global", "b": "Unrelated E/M (mod 24) | staged planned procedure (58) | unplanned return to OR (78) | unrelated procedure (79) | significant separate E/M same day (25)."}, {"h": "Not included in global", "b": "Diagnostic tests | treatment of underlying disease | complications requiring return to OR (billed with 78) | unrelated conditions."}, {"h": "Split global", "b": "When one physician does the surgery and another does post-op: surgeon uses modifier 54 (surgical care only), post-op physician uses 55 (post-op only). 56 = pre-op only."}, {"h": "Never bundled inside global", "b": "Follow-up visits for unrelated issues (24) | truly separate procedures during global (79) | diagnostic scopes leading to open surgery decisions."}], "cards": [{"q": "What global period does a 'major' surgery carry?", "a": "90 days."}, {"q": "What is included in the CPT surgical package?", "a": "Local anesthesia, one same-day E/M, immediate post-op care, and typical uncomplicated follow-up."}, {"q": "Modifier for unrelated E/M during global?", "a": "24."}, {"q": "Modifier for surgical care only when care is split?", "a": "54."}, {"q": "Are complications requiring OR return billable?", "a": "Yes \u2014 with modifier 78."}, {"q": "Modifier when a planned staged procedure is done during global?", "a": "58."}], "quiz": [{"q": "Which is included in the global surgical package?", "opts": ["Treatment of the underlying disease", "Uncomplicated follow-up visits", "Diagnostic tests", "Unrelated E/M"], "a": 1, "e": "Typical, uncomplicated follow-up is bundled into global."}, {"q": "Patient 30 days post-CABG (90-day global) presents for flu. E/M?", "opts": ["Bundled", "Bill with modifier 24", "Bill with modifier 25", "Not billable"], "a": 1, "e": "Unrelated E/M during global = 24."}, {"q": "Surgeon does the operation. Family physician handles post-op care by agreement. How does surgeon bill?", "opts": ["Full code, no modifier", "Full code with modifier 54", "Full code with modifier 55", "Full code with modifier 56"], "a": 1, "e": "Split care \u2014 surgeon uses 54 for surgical care only."}, {"q": "Global period for endoscopy without biopsy?", "opts": ["0-day", "10-day", "90-day", "No global"], "a": 0, "e": "Most endoscopies are 0-day global."}, {"q": "During 90-day global, same surgeon does an unrelated appendectomy. Modifier?", "opts": ["58", "78", "79", "24"], "a": 2, "e": "Unrelated procedure by same physician during global = 79."}]}, {"n": 7, "title": "Integumentary", "emoji": "\ud83e\ude79", "rules": [{"h": "Lesion excision \u2014 measure", "b": "Code by lesion diameter + narrowest margin \u00d7 2, at time of excision (not path report). Excised diameter = lesion + margins."}, {"h": "Benign vs malignant", "b": "Different code families. Benign = 11400 series. Malignant = 11600 series. If path pending, code by the intent/documented clinical impression, then re-code if needed."}, {"h": "Repair layers", "b": "Simple (12001\u201312021): epidermis/dermis, one layer. Intermediate (12031\u201312057): layered closure, or single-layer with extensive cleaning. Complex (13100\u201313160): scar revision, extensive undermining, retention sutures."}, {"h": "Sum repair lengths by anatomic group", "b": "Add lengths of same-classification repairs within same anatomic grouping and report once. Don't sum across groups (e.g., face vs trunk)."}, {"h": "Debridement \u2014 by depth and area", "b": "11042 subcutaneous | 11043 muscle/fascia | 11044 bone. Add-on +11045/+11046/+11047 for each additional 20 sq cm."}, {"h": "Skin grafts", "b": "Report by recipient site AND size. Free skin grafts include simple debridement of graft site. Xenograft/allograft/autograft \u2014 different codes."}, {"h": "Biopsy hierarchy", "b": "Tangential biopsy (11102/11103) | Punch (11104/11105) | Incisional (11106/11107). Report the deepest/most complex biopsy method used."}], "cards": [{"q": "How do you measure a lesion for excision?", "a": "Lesion diameter + narrowest margin \u00d7 2, measured before excision."}, {"q": "Difference between simple and intermediate repair?", "a": "Simple = one layer. Intermediate = layered closure, or single layer with extensive cleaning."}, {"q": "How are multiple repairs of the same type reported?", "a": "Sum lengths within same anatomic grouping and same classification, report once."}, {"q": "Debridement code for muscle/fascia depth?", "a": "11043 (+11046 each additional 20 sq cm)."}, {"q": "Biopsy method hierarchy?", "a": "Tangential \u2192 Punch \u2192 Incisional. Report the most complex used."}, {"q": "Malignant lesion excision code family?", "a": "11600 series."}], "quiz": [{"q": "1.5 cm malignant lesion of the arm with 0.5 cm margins on each side. What's the excised diameter?", "opts": ["1.5 cm", "2.0 cm", "2.5 cm", "3.0 cm"], "a": 2, "e": "1.5 + (0.5 \u00d7 2) = 2.5 cm."}, {"q": "Two intermediate repairs: 3 cm on the forehead and 4 cm on the cheek. How to report?", "opts": ["Sum to 7 cm, one code", "Two separate codes", "Sum only if same laterality", "Report each length as separate lines"], "a": 0, "e": "Face repairs of the same classification group together (same anatomic grouping) \u2014 7 cm, one code."}, {"q": "Debridement of 30 sq cm down to muscle. Code(s)?", "opts": ["11042", "11043", "11043 + 11046", "11044"], "a": 2, "e": "11043 (first 20 sq cm to muscle) + 11046 (each add'l 20 sq cm) \u2014 code once even for 10 more sq cm."}, {"q": "Punch biopsy of two separate lesions. How to report?", "opts": ["11104", "11104 + 11105", "11104 x 2", "11106"], "a": 1, "e": "11104 (first) + 11105 (each additional) \u2014 add-on for the second."}, {"q": "5 cm simple laceration repair of scalp. Best code range?", "opts": ["12001\u201312007 (Simple, scalp/neck/axillae/etc.)", "12011\u201312018 (Simple, face)", "12031\u201312037 (Intermediate)", "13120\u201313122 (Complex)"], "a": 0, "e": "Scalp = 12001 series for simple repair."}]}, {"n": 8, "title": "Musculoskeletal", "emoji": "\ud83e\uddb4", "rules": [{"h": "Fracture treatment types", "b": "Closed treatment (no exposure of fracture site) \u2014 with or without manipulation. Open treatment (surgically opened). Percutaneous fixation (skin puncture, imaging-guided)."}, {"h": "Cast/splint application", "b": "Initial cast/splint by treating provider is included in fracture care. Replacement casts or splints not part of restorative treatment can be billed separately (29000 series)."}, {"h": "Arthroscopy vs arthrotomy", "b": "Scope = arthroscopic (29800 series). Open joint = arthrotomy. Diagnostic scope followed by same-session surgical scope: only the surgical is reported."}, {"h": "Spinal procedures", "b": "Discectomy, laminectomy, fusion, instrumentation \u2014 each often billed separately with add-ons for additional levels. Bone graft codes are separate add-ons."}, {"h": "Fracture with manipulation", "b": "Manipulation = reduction. If closed with manipulation vs closed without \u2192 different codes. Percutaneous pinning may follow."}, {"h": "Application of external fixation", "b": "Uniplane vs multiplane systems. Included in some fracture care codes; separately billable in others \u2014 check code descriptor."}], "cards": [{"q": "What defines 'closed treatment' of a fracture?", "a": "Fracture site is not surgically opened, whether or not manipulation is performed."}, {"q": "Is initial cast application billed separately?", "a": "No \u2014 included with fracture care when applied by the treating provider."}, {"q": "When is a diagnostic arthroscopy separately billable?", "a": "Not when converted to surgical arthroscopy in the same session \u2014 only the surgical is reported."}, {"q": "How are additional spinal levels reported?", "a": "With add-on codes for each additional level."}, {"q": "What's percutaneous fixation?", "a": "Skin puncture (usually imaging-guided) placement of hardware without opening the fracture site."}], "quiz": [{"q": "Closed reduction and cast of distal radius fracture. Cast billing?", "opts": ["Bill cast separately", "Cast is included", "Bill cast with modifier 59", "Only bill cast supplies"], "a": 1, "e": "Initial cast in fracture care is included."}, {"q": "Diagnostic knee scope during which the surgeon proceeds to meniscectomy. Bill?", "opts": ["29870 + 29881", "29881 only", "29870 with modifier 59", "Both with modifier 51"], "a": 1, "e": "Diagnostic scope is bundled when it leads to surgical scope same session."}, {"q": "L4-L5 and L5-S1 laminectomy. How reported?", "opts": ["One code, single level", "Primary + add-on for additional level", "Two separate primary codes", "Modifier 22 on primary"], "a": 1, "e": "Primary code for first level, add-on for the additional level."}, {"q": "Percutaneous pinning of scaphoid fracture. Category?", "opts": ["Closed without manipulation", "Closed with manipulation", "Percutaneous fixation", "Open treatment"], "a": 2, "e": "Skin puncture + hardware without opening the fracture = percutaneous fixation."}, {"q": "Patient returns to clinic for replacement short arm cast (not treating provider, restorative already done). Billable?", "opts": ["No", "Yes, 29075", "Only supplies", "Bundled to fracture code"], "a": 1, "e": "Replacement cast outside restorative treatment is separately reported (29075)."}]}, {"n": 9, "title": "Respiratory", "emoji": "\ud83e\udec1", "rules": [{"h": "Bronchoscopy family", "b": "31622 diagnostic (base). All bronchoscopies are 51-exempt \u2014 never use 51 with bronch codes. Multiple bronch procedures done together = each billed at full value."}, {"h": "Nasal/sinus endoscopy", "b": "31231 diagnostic nasal endoscopy. Sinus scopes (31237\u201331298) \u2014 each sinus can have its own code. Bilateral = modifier 50."}, {"h": "Laryngoscopy", "b": "Indirect (31505) | Direct diagnostic (31515) | Flexible fiberoptic (31575). Add codes for biopsy, foreign body removal, injection."}, {"h": "Thoracentesis vs chest tube", "b": "32554/32555 thoracentesis (needle drainage; with/without imaging). 32550 tunneled pleural catheter. 32551 chest tube (tube thoracostomy)."}, {"h": "Lobectomy vs pneumonectomy", "b": "32480 lobectomy (single lobe). 32482 two lobes (bilobectomy). 32440 pneumonectomy (entire lung). Open vs VATS = different codes."}, {"h": "Nasal fracture treatment", "b": "21315 closed w/o stabilization, 21320 closed with stabilization, 21325 open. Choose by manipulation and hardware."}], "cards": [{"q": "Are bronchoscopies subject to modifier 51?", "a": "No \u2014 the bronch family is 51-exempt."}, {"q": "Diagnostic bronchoscopy code?", "a": "31622."}, {"q": "Thoracentesis with imaging guidance code?", "a": "32555."}, {"q": "Pneumonectomy = ?", "a": "Removal of the entire lung (32440)."}, {"q": "How to report bilateral sinus endoscopy?", "a": "Report the code with modifier 50 (bilateral)."}], "quiz": [{"q": "Diagnostic bronch + BAL + transbronchial biopsy same session. Modifier?", "opts": ["51 on secondary", "No 51 \u2014 bronch is 51-exempt", "59 on all", "50"], "a": 1, "e": "All bronch codes are 51-exempt."}, {"q": "Thoracentesis performed with ultrasound guidance. Code?", "opts": ["32554", "32555", "32550", "32551"], "a": 1, "e": "32555 = thoracentesis with imaging guidance."}, {"q": "Video-assisted thoracoscopic surgery lobectomy \u2014 right upper lobe. Which family?", "opts": ["Open lobectomy (32480)", "VATS lobectomy (32663)", "Segmentectomy", "Pneumonectomy"], "a": 1, "e": "VATS has its own code family (32663 for VATS lobectomy)."}, {"q": "Closed reduction of nasal fracture with internal stabilization. Code?", "opts": ["21315", "21320", "21325", "21330"], "a": 1, "e": "21320 = closed with stabilization."}, {"q": "Bilateral maxillary sinus endoscopy. Coding?", "opts": ["Code x 2", "Code with modifier 50", "Code with modifier 59", "Report only left"], "a": 1, "e": "Modifier 50 for bilateral."}]}, {"n": 10, "title": "Cardiovascular", "emoji": "\u2764\ufe0f", "rules": [{"h": "Cardiac cath families", "b": "93451 right heart | 93452 left heart | 93453 combined | 93454\u201393461 coronary angiography with/without ventriculography and/or right heart cath. Congenital cath has its own codes."}, {"h": "PCI codes", "b": "92920\u201392944. Coded per major coronary artery/branch. Include intervention type: angioplasty, stenting, atherectomy. Base + add-on for additional vessels."}, {"h": "Pacemaker vs ICD", "b": "Insertion coded by system + lead(s). Single chamber = one lead. Dual chamber = two leads. Biventricular = three leads. Generator change \u2260 system insertion."}, {"h": "Vascular access", "b": "CVC (central venous cath): 36555\u201336571. Non-tunneled vs tunneled, with/without port, and by age. Report guidance separately if applicable."}, {"h": "Bypass \u2014 arterial vs venous grafts", "b": "CABG using venous grafts only: 33510\u201333516. Arterial grafts: 33533\u201333536. Combined arterial+venous: report both a 33533 series + 33517 series add-on for venous."}, {"h": "EP studies and ablation", "b": "93650s. Comprehensive EP with or without induction. Ablation for AF, SVT, VT \u2014 each has specific code."}, {"h": "Endovascular repair", "b": "AAA endovascular repair (34701\u201334708) by device and extent. Includes intraoperative angiography."}], "cards": [{"q": "Right heart cath alone code?", "a": "93451."}, {"q": "How are PCIs coded?", "a": "Per major coronary artery/branch, with base + add-ons for additional vessels."}, {"q": "CABG using three venous grafts only \u2014 code family?", "a": "33510\u201333516 (venous only). 33512 = three venous grafts."}, {"q": "How many leads does a dual chamber pacemaker have?", "a": "Two \u2014 one atrial, one ventricular."}, {"q": "Are pacemaker generator replacements coded the same as new system insertions?", "a": "No \u2014 separate code family (33227\u201333229 for pacer generator only)."}], "quiz": [{"q": "CABG with 2 arterial and 1 venous graft. Coding structure?", "opts": ["Only 33534 (2 arterial)", "33534 + 33517 (add-on venous)", "33511 (2 venous)", "33533 x 3"], "a": 1, "e": "Arterial base (33534 for 2 arterial) + add-on venous (33517)."}, {"q": "PCI with stent placement to LAD and separate PCI to RCA. Coding?", "opts": ["One code", "Base PCI + add-on for additional major coronary", "Two base PCI codes", "Modifier 50"], "a": 1, "e": "Base PCI + add-on for the second major coronary artery."}, {"q": "Insertion of dual-chamber pacemaker with two new leads. Category?", "opts": ["Single chamber", "Dual chamber", "Biventricular", "Generator only"], "a": 1, "e": "Dual chamber system = atrial + ventricular leads."}, {"q": "Diagnostic cath: right heart + coronary angiography without ventriculography. Which base?", "opts": ["93451", "93454", "93456", "93460"], "a": 2, "e": "93456 = combined right heart cath + coronary angio without ventriculography."}, {"q": "Non-tunneled CVC placed in a 40-year-old. Which range?", "opts": ["36555\u201336556", "36557\u201336558", "36560\u201336561", "36565\u201336566"], "a": 0, "e": "Non-tunneled CVC without port, age 5+ = 36556."}]}, {"n": 11, "title": "Digestive", "emoji": "\ud83c\udf7d\ufe0f", "rules": [{"h": "EGD family", "b": "43235 diagnostic EGD. Biopsy 43239. Add codes for control of bleeding, dilation, foreign body, injection, band ligation, ablation, EMR."}, {"h": "Colonoscopy family", "b": "45378 diagnostic. 45380 biopsy. 45385 snare polypectomy. 45384 hot biopsy forceps. 45388 ablation. Different techniques on different lesions = each billable with 59/XS."}, {"h": "Screening vs diagnostic colon", "b": "Screening colonoscopy with polyp removal \u2192 modifier PT (Medicare) or 33 (commercial). Reported as diagnostic code but with modifier signaling screening intent."}, {"h": "Hernia repair", "b": "Coded by type (inguinal, ventral, umbilical), reducibility (reducible vs incarcerated/strangulated), initial vs recurrent, and age. Mesh is add-on only for open incisional/ventral repairs."}, {"h": "Cholecystectomy", "b": "47562 laparoscopic simple. 47563 laparoscopic with cholangiography. 47564 with common bile duct exploration. 47600 series = open."}, {"h": "Appendectomy", "b": "44950 open standalone. 44970 laparoscopic. +44955 = incidental to another procedure (add-on). Ruptured appendix with abscess adds work \u2014 44960."}], "cards": [{"q": "Diagnostic colonoscopy code?", "a": "45378."}, {"q": "Snare polypectomy at colonoscopy?", "a": "45385."}, {"q": "Modifier for a screening colonoscopy that became therapeutic (Medicare)?", "a": "PT."}, {"q": "Laparoscopic cholecystectomy with cholangiography?", "a": "47563."}, {"q": "Incidental appendectomy code?", "a": "+44955 (add-on)."}, {"q": "Coding a hernia pplies."}, {"h": "OIG Compliance Program elements", "b": "7 core elements: standards/policies | oversight | training | communication | monitoring/auditing | enforcement/discipline | corrective action."}], "cards": [{"q": "TPO stands for?", "a": "Treatment, Payment, and Operations."}, {"q": "Breach affecting 500+ individuals \u2014 who must be notified?", "a": "Individuals, HHS, and media, within 60 days."}, {"q": "What are NCCI edits?", "a": "Column 1/Column 2 code pair edits \u2014 cannot bill together unless bypassed with appropriate modifier."}, {"q": "What is an MUE?", "a": "Medically Unlikely Edit \u2014 the max units of a code per patient per day."}, {"q": "What law prohibits payment for referrals of federal healthcare business?", "a": "Anti-Kickback Statute."}, {"q": "Stark Law focuses on?", "a": "Physician self-referral for designated health services."}, {"q": "How many OIG compliance program core elements?", "a": "Seven."}], "quiz": [{"q": "Under HIPAA, which use of PHI does NOT require patient authorization?", "opts": ["Marketing to patients", "Sale of PHI", "Treatment, payment, operations", "Research without waiver"], "a": 2, "e": "TPO is permitted without authorization."}, {"q": "NCCI edit exists between two codes. When can you unbundle?", "opts": ["Never", "Any time", "When clinical circumstances support it and appropriate modifier applies", "With modifier 51"], "a": 2, "e": "Distinct clinical circumstance + modifier 59/X{EPSU} where appropriate."}, {"q": "Breach affects 400 individuals. When must HHS be notified?", "opts": ["Immediately", "Within 60 days", "Within the annual report of breaches under 500", "Never"], "a": 2, "e": "Under 500 = annual report to HHS."}, {"q": "Physician owns a lab and refers Medicare patients there. Which law applies?", "opts": ["HIPAA", "False Claims Act", "Stark Law", "OSHA"], "a": 2, "e": "Physician self-referral for DHS = Stark."}, {"q": "Which is NOT one of the OIG core compliance elements?", "opts": ["Training and edu let currentChap = 1;
let currentTab = "study";
let cardIndex = 0, cardFlipped = false;
let quizState = {}; // {chap: {answers:[{i,correct}], done:bool}}

const LS_KEY = "cptclinic_v1";
function loadState(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)||"{}"); }catch(e){return {}} }
function saveState(){ localStorage.setItem(LS_KEY, JSON.stringify({quizState})); }
(function init(){ const s = loadState(); if(s.quizState) quizState = s.quizState; })();

function renderChapNav(){
  const el = document.getElementById("chapnav");
  el.innerHTML = "";
  CHAPTERS.forEach(c=>{
    const b = document.createElement("div");
    b.className = "chip" + (c.n===currentChap?" active":"");
    b.innerHTML = `<span class="n">${c.n}</span> <span>${c.emoji}</span> <span>${c.title}</span>`;
    b.onclick = ()=>{ currentChap = c.n; cardIndex=0; cardFlipped=false; renderChapNav(); render(); };
    el.appendChild(b);
  });
  // scroll active into view
  const active = el.querySelector(".chip.active");
  if(active) active.scrollIntoView({behavior:"smooth", inline:"center", block:"nearest"});
}

document.querySelectorAll(".tab").forEach(t=>{
  t.onclick = ()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    currentTab = t.dataset.t;
    cardIndex = 0; cardFlipped = false;
    render();
  };
});

function chap(){ return CHAPTERS.find(c=>c.n===currentChap); }

function render(){
  const v = document.getElementById("view");
  const c = chap();
  const head = `<div class="chap-head"><div class="chap-title">${c.emoji} Ch ${c.n} · ${c.title}</div><div class="pill">${c.rules.length} rules · ${c.cards.length} cards · ${c.quiz.length} q</div></div>`;
  if(currentTab==="study") v.innerHTML = head + renderStudy(c);
  else if(currentTab==="cards") v.innerHTML = head + renderCards(c);
  else if(currentTab==="quiz") v.innerHTML = head + renderQuiz(c);
  else v.innerHTML = renderMastery();
  attachHandlers();
}

function renderStudy(c){
  return c.rules.map(r=>`<div class="card"><h3>${r.h}</h3><p>${r.b}</p></div>`).join("");
}

function renderCards(c){
  const total = c.cards.length;
  const card = c.cards[cardIndex];
  const pct = Math.round(((cardIndex+1)/total)*100);
  return `
    <div class="qmeta">Card ${cardIndex+1} of ${total}</div>
    <div class="progress"><i style="width:${pct}%"></i></div>
    <div class="flip" id="flipCard">
      <div class="q">${card.q}</div>
      ${cardFlipped ? `<div class="a">${card.a}</div>` : `<div class="hint">Tap to reveal</div>`}
    </div>
    <div class="row">
      <button class="btn ghost" id="prevCard" ${cardIndex===0?"disabled":""}>← Prev</button>
      <button class="btn gold" id="flipBtn">${cardFlipped?"Hide":"Flip"}</button>
      <button class="btn" id="nextCard" ${cardIndex===total-1?"disabled":""}>Next →</button>
    </div>
  `;
}

function renderQuiz(c){
  const st = quizState[c.n] || {answers:[], done:false};
  const total = c.quiz.length;
  const idx = st.answers.length;
  if(st.done || idx>=total){
    const correct = st.answers.filter(a=>a.correct).length;
    const pct = Math.round(correct/total*100);
    let html = `<div class="card"><h3>Score</h3><p style="font-size:22px;color:${pct>=70?'var(--good)':pct>=50?'var(--gold)':'var(--bad)'};font-weight:800">${correct}/${total} · ${pct}%</p><div class="progress" style="margin-top:10px"><i style="width:${pct}%"></i></div></div>`;
    html += c.quiz.map((q,i)=>{
      const a = st.answers[i];
      return `<div class="card"><div class="qmeta">Q${i+1} · ${a && a.correct?"✅":"❌"}</div><p style="margin-top:4px;font-weight:700">${q.q}</p><p style="margin-top:6px;color:var(--muted)">Your answer: ${a? q.opts[a.i] : "—"}</p><p style="margin-top:4px;color:var(--good)">Correct: ${q.opts[q.a]}</p><div class="explain">${q.e}</div></div>`;
    }).join("");
    html += `<div class="row" style="margin-top:12px"><button class="btn ghost" id="resetQuiz">Reset chapter quiz</button></div>`;
    return html;
  }
  const q = c.quiz[idx];
  const pct = Math.round((idx/total)*100);
  return `
    <div class="qmeta">Question ${idx+1} of ${total}</div>
    <div class="progress"><i style="width:${pct}%"></i></div>
    <div class="card"><p style="font-weight:700;font-size:15px">${q.q}</p></div>
    ${q.opts.map((o,i)=>`<div class="opt" data-i="${i}">${String.fromCharCode(65+i)}. ${o}</div>`).join("")}
  `;
}

function renderMastery(){
  let totalCorrect=0, totalAsked=0, complete=0;
  const rows = CHAPTERS.map(c=>{
    const st = quizState[c.n];
    const answered = st ? st.answers.length : 0;
    const correct = st ? st.answers.filter(a=>a.correct).length : 0;
    totalAsked += c.quiz.length;
    totalCorrect += correct;
    if(st && st.done) complete++;
    const pct = c.quiz.length ? Math.round(correct/c.quiz.length*100) : 0;
    const dotClass = !st?"none": st.done?"done":"some";
    const status = !st ? "Not started" : st.done ? `${correct}/${c.quiz.length} correct` : `In progress · ${answered}/${c.quiz.length}`;
    return `<div class="master-row"><div class="left"><div class="t"><span class="dot ${dotClass}"></span><span>${c.n}. ${c.emoji} ${c.title}</span></div><div class="qmeta">${status}</div></div><div class="right"><div class="pct">${pct}%</div><div class="bar"><i style="width:${pct}%"></i></div></div></div>`;
  }).join("");
  const overallPct = totalAsked ? Math.round(totalCorrect/totalAsked*100) : 0;
  return `
    <div class="grid">
      <div class="stat"><div class="n">${complete}/16</div><div class="l">Chapters done</div></div>
      <div class="stat"><div class="n">${totalCorrect}</div><div class="l">Correct answers</div></div>
      <div class="stat"><div class="n">${overallPct}%</div><div class="l">Overall accuracy</div></div>
      <div class="stat"><div class="n">${totalAsked}</div><div class="l">Total questions</div></div>
    </div>
    <div class="master-list">${rows}</div>
    <div class="row" style="margin-top:12px"><button class="btn ghost" id="resetAll">Reset all progress</button></div>
  `;
}

function attachHandlers(){
  const fc = document.getElementById("flipCard");
  if(fc) fc.onclick = ()=>{ cardFlipped = !cardFlipped; render(); };
  const fb = document.getElementById("flipBtn");
  if(fb) fb.onclick = ()=>{ cardFlipped = !cardFlipped; render(); };
  const pc = document.getElementById("prevCard");
  if(pc) pc.onclick = ()=>{ cardIndex = Math.max(0, cardIndex-1); cardFlipped=false; render(); };
  const nc = document.getElementById("nextCard");
  if(nc) nc.onclick = ()=>{ cardIndex = Math.min(chap().cards.length-1, cardIndex+1); cardFlipped=false; render(); };

  document.querySelectorAll(".opt").forEach(el=>{
    el.onclick = ()=>{
      if(el.classList.contains("locked")) return;
      const c = chap();
      const st = quizState[c.n] || {answers:[], done:false};
      const idx = st.answers.length;
      const q = c.quiz[idx];
      const picked = parseInt(el.dataset.i,10);
      const correct = picked===q.a;
      st.answers.push({i:picked, correct});
      if(st.answers.length >= c.quiz.length) st.done = true;
      quizState[c.n] = st;
      saveState();
      // brief flash then advance
      document.querySelectorAll(".opt").forEach((o,i)=>{
        o.classList.add("locked");
        if(i===q.a) o.classList.add("correct");
        else if(i===picked) o.classList.add("wrong");
      });
      setTimeout(()=>render(), 700);
    };
  });

  const rq = document.getElementById("resetQuiz");
  if(rq) rq.onclick = ()=>{ if(confirm("Reset this chapter's quiz?")){ delete quizState[chap().n]; saveState(); render(); } };
  const ra = document.getElementById("resetAll");
  if(ra) ra.onclick = ()=>{ if(confirm("Reset ALL progress across all 16 chapters?")){ quizState = {}; saveState(); render(); } };
}

renderChapNav();
render();
</script>
</body>
